<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ninja Talks – Tribute Songs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Correct global stylesheet path -->
  <link rel="stylesheet" href="/NinjaTalks/assets/css/global.css">

  <style>
    /* Ensure side menu works consistently */
    .side-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100%;
      background: #3a0ca3;
      padding-top: 80px;
      transform: translateX(-260px);
      transition: transform 0.3s ease;
      z-index: 9999;
    }
    .side-menu.open { transform: translateX(0); }
  </style>
</head>

<body>

<header>
  <div class="logo-container">
    <!-- Update with your actual logo file -->
    <img src="/NinjaTalks/assets/images/IMG-20260227-WA0002(1).jpg" class="logo" alt="Ninja Talks Logo">
    <h1>Ninja Talks</h1>
  </div>
  <nav><button class="menu-toggle" onclick="toggleMenu()">☰</button></nav>
</header>

<div class="side-menu" id="sideMenu">
  <button class="close-menu" onclick="toggleMenu()">✖</button>
  <ul>
    <li><a href="/NinjaTalks/index.html">Home</a></li>
    <li><a href="/NinjaTalks/neurodiversity.html">Neurodiversity</a></li>
    <li><a href="/NinjaTalks/wellness.html">Mind & Body</a></li>
    <li><a href="/NinjaTalks/storytime.html">Story Time</a></li>
    <li><a href="/NinjaTalks/fellowship.html">Fellowship</a></li>
    <li><a href="/NinjaTalks/music.html">AI Music</a></li>
    <li><a href="/NinjaTalks/shop.html">Shop</a></li>
    <li><a href="/NinjaTalks/tribute.html">Tribute Songs</a></li>
    <li><a href="/NinjaTalks/contact.html">Contact</a></li>
  </ul>
</div>

<main>

<section class="hero">
  <div class="page-logo-container">
    <!-- Update with your tribute logo file -->
    <img src="/NinjaTalks/assets/images/page-logo.png" class="page-logo" alt="Tribute Logo">
  </div>
  <h2 class="hero-title">Tribute Songs</h2>
  <p class="hero-tagline">Celebrating creativity and connection</p>
  <!-- Upload button -->
  <a href="YOUR_GOOGLE_FORM_URL" class="btn">Upload Your Tribute (MP3 Only)</a>
</section>

<section>
  <h3>Approved Tributes</h3>
  <div id="tributes" class="highlight-grid">Loading tributes...</div>
</section>

</main>

<footer><p>&copy; Ninja Talks</p></footer>

<script>
function toggleMenu() {
  document.getElementById("sideMenu").classList.toggle("open");
}

// Load tributes from Apps Script web app
async function loadTributes() {
  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbykl6HYzisVa2qdME82zEHD-B85GkZafqVebg8OX7HUgi1_tqBpgUyUDno52wHTTClV/exec");
    const tributes = await response.json();

    const container = document.getElementById("tributes");
    container.innerHTML = "";

    tributes.forEach(t => {
      if (t.status === "Ready") {
        const card = document.createElement("div");
        card.className = "highlight-card";
        card.innerHTML = `
          <h4>${t.songtitle || "Untitled"}</h4>
          <p>By ${t.artist || "Unknown"}</p>
          <audio controls src="${t["upload mp3 file"]}"></audio>
        `;
        container.appendChild(card);
      }
    });

    if (container.innerHTML === "") {
      container.innerHTML = "<p>No approved tributes yet.</p>";
    }
  } catch (err) {
    document.getElementById("tributes").innerHTML = "<p>Error loading tributes: " + err + "</p>";
  }
}

loadTributes();
</script>

</body>
</html>
