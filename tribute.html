<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Global theme stylesheet -->

  <link rel="stylesheet" href="/NinjaTalks/assets/css/tribute.css">

  <!-- Amplitude.js CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.min.css">
</head>

<body>

<header>
  <div class="logo-container">
    <img src="/NinjaTalks/assets/images/IMG-20260227-WA0002(1).jpg" class="logo" alt="Ninja Talks Logo">
    <h1>Ninja Talks</h1>
  </div>
  <nav>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
  </nav>
</header>

<div class="side-menu" id="sideMenu">
  <button class="close-menu" onclick="toggleMenu()">✖</button>
  <ul>
    <li><a href="/NinjaTalks/index.html">Home</a></li>
    <li><a href="/NinjaTalks/neurodiversity.html">Neurodiversity</a></li>
    <li><a href="/NinjaTalks/wellness.html">Mind & Body</a></li>
    <li><a href="/NinjaTalks/storytime.html">Story Time</a></li>
    <li><a href="/NinjaTalks/fellowship.html">Fellowship</a></li>
    <li><a href="/NinjaTalks/music.html">AI Music</a></li>
    <li><a href="/NinjaTalks/shop.html">Shop</a></li>
    <li><a href="/NinjaTalks/tribute.html">Tribute Songs</a></li>
    <li><a href="/NinjaTalks/contact.html">Contact</a></li>
  </ul>
</div>

<main>
<section class="hero">
  <img src="/NinjaTalks/assets/images/IMG-20260227-WA0002(1).jpg" class="page-logo" alt="Tribute Logo">
  <div class="page-log">🎵 Live Tribute Submissions Log</div>
  <h2 class="hero-title">Tribute Songs</h2>
  <p class="hero-tagline">Celebrating creativity and connection</p>
  <a href="https://docs.google.com/forms/d/e/1FAIpQLSfrpzWvDn38ZmSGJWGKw89yGBNLRmzJyjZwonlKJEKUM-kRwQ/viewform?usp=sharing"
     target="_blank" class="btn">Upload Your Tribute (MP3 Only)</a>
</section>

<section>
  <h3>Approved Tributes</h3>
  <!-- Amplitude Player -->
  <div id="amplitude-player">
    <div class="amplitude-play-pause"></div>
    <div class="amplitude-prev"></div>
    <div class="amplitude-next"></div>
    <div class="amplitude-song-info">
      <span class="amplitude-song-name"></span> –
      <span class="amplitude-artist"></span>
    </div>
    <div class="amplitude-time">
      <span class="amplitude-current-time"></span> /
      <span class="amplitude-duration"></span>
    </div>
    <div class="amplitude-progress-container">
      <input type="range" class="amplitude-song-slider"/>
    </div>
    <div id="playlist"></div>
  </div>
</section>
</main>

<footer><p>&copy; Ninja Talks</p></footer>

<!-- Amplitude.js -->
<script src="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.min.js"></script>

<script>
function toggleMenu() {
  document.getElementById("sideMenu").classList.toggle("open");
}

// Load tributes and initialize Amplitude
async function loadTributes() {
  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbzLVf46EUKHYpsyTYcMDQpzjIGcbOzI3YjtIv7nQ5_3bmrwW60ujXc4fqye7pJYvw8/exec");
    const tributes = await response.json();

    const songs = tributes.filter(t => t.status === "Ready").map(t => ({
      name: t["song title"] || "Untitled",
      artist: t["artist name"] || "Unknown",
      url: t["upload mp3 file"],
      custom_meta: {
        timestamp: new Date(t["timestamp"]).toLocaleString()
      }
    }));

    // Initialize Amplitude with playlist
    Amplitude.init({
      songs: songs
    });

    // Build playlist UI with fallback
    const playlist = document.getElementById("playlist");
    songs.forEach((song, index) => {
      const item = document.createElement("div");
      item.className = "amplitude-song-container";
      item.innerHTML = `
        <strong>${song.name}</strong> by ${song.artist}
        <br><small>Submitted on ${song.custom_meta.timestamp}</small>
        <br>
        <audio controls preload="auto">
          <source src="${song.url}" type="audio/mpeg">
          ⚠️ This track may not play. Please check file format (MP3 only) and sharing settings.
        </audio>
      `;
      playlist.appendChild(item);
    });

    document.querySelector(".page-log").textContent =
      "🎵 Live Tribute Submissions Log – Last updated: " + new Date().toLocaleString();

  } catch (err) {
    document.getElementById("playlist").innerHTML = "<p>Error loading tributes: " + err + "</p>";
  }
}

loadTributes();
</script>

</body>
</html>
