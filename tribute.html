<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ninja Talks Tribute Songs</title>
  <!-- Correct path to your global stylesheet -->
  <link rel="stylesheet" href="assets/css/global.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo-container">
      <img src="logo.png" alt="Ninja Talks Logo" class="logo">
      <h1>Tribute Songs</h1>
    </div>
    <button class="menu-toggle">&#9776;</button>
  </header>

  <!-- Side Menu -->
  <nav class="side-menu" id="sideMenu">
    <button class="close-menu" onclick="toggleMenu()">&times;</button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="tribute.html">Tributes</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <img src="page-logo.png" alt="Tribute Logo" class="page-logo">
    <h2 class="hero-title">Community Tribute Songs</h2>
    <p class="hero-tagline">Celebrating creativity and connection</p>
  </section>

  <!-- Main Content -->
  <main>
    <section>
      <h2>Approved Tributes</h2>
      <div id="tributes" class="highlight-grid">Loading tributes...</div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Ninja Talks. All rights reserved.</p>
  </footer>

  <script>
    // Side menu toggle
    document.querySelector('.menu-toggle').addEventListener('click', toggleMenu);
    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('open');
    }

    // Load tributes from Apps Script web app
    async function loadTributes() {
      try {
        const response = await fetch("https://script.google.com/macros/s/AKfycbykl6HYzisVa2qdME82zEHD-B85GkZafqVebg8OX7HUgi1_tqBpgUyUDno52wHTTClV/exec");
        const tributes = await response.json();

        const container = document.getElementById("tributes");
        container.innerHTML = "";

        tributes.forEach(t => {
          if (t.status === "Ready") {
            const card = document.createElement("div");
            card.className = "highlight-card";
            card.innerHTML = `
              <h4>${t.songtitle || "Untitled"}</h4>
              <p>By ${t.artist || "Unknown"}</p>
              <audio controls src="${t["upload mp3 file"]}"></audio>
            `;
            container.appendChild(card);
          }
        });

        if (container.innerHTML === "") {
          container.innerHTML = "<p>No approved tributes yet.</p>";
        }
      } catch (err) {
        document.getElementById("tributes").innerHTML = "<p>Error loading tributes: " + err + "</p>";
      }
    }

    loadTributes();
  </script>
</body>
</html>
